<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Stories</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<!-- Story Circle -->
<div class="story-circle" onclick="openAdminLogin()">
  <img src="https://via.placeholder.com/100" />
</div>

<!-- عرض القصة -->
<div id="storyViewer" class="modal">
  <video id="storyVideo" controls autoplay></video>
</div>

<!-- Admin Login -->
<div id="adminLogin" class="modal">
  <input type="password" id="adminPass" placeholder="Password">
  <button onclick="login()">Login</button>
</div>

<!-- Add Story -->
<div id="adminPanel" class="modal">
  <h3>Add Story</h3>

  <input type="text" id="youtubeUrl" placeholder="YouTube link">
  <input type="file" id="videoFile">

  <button onclick="submitStory()">Add Story</button>
</div>

<script src="script.js"></script>
</body>
</html>
